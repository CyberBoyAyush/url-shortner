<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>url shortner.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&family=Prata&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <div class="logo">url shortner.</div>
    </nav>

    <main class="hero">
        <section class="hero-left">
            <span class="tag">CREATE. SHARE. TRACK</span>
            <h1>Shorten links<br><span class="accent">Amplify reach</span></h1>
            <p class="description">
                Track performance, manage redirects <br>
                Transform long URLs into clean &amp; shareable links
            </p>

            <div class="stats-row">
                <div class="stat">
                    <span class="stat-number" id="urlCounter">0</span>
                    <span class="stat-label">URLs Shortened</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat">
                    <span class="stat-number" id="uptimeCounter">0%</span>
                    <span class="stat-label">Server Uptime</span>
                </div>
            </div>
        </section>

        <section class="hero-right">
            <div class="shortener-card">
                <div class="card-header">
                    <span class="card-tag">TRY IT NOW</span>
                </div>
                <div class="input-group">
                    <input
                        type="url"
                        id="urlInput"
                        placeholder="Paste the long URL"
                        autocomplete="off"
                        spellcheck="false"
                    >
                    <button id="shortenBtn" class="shorten-btn">
                        <span class="btn-text">Shorten URL</span>
                        <span class="btn-loader"></span>
                    </button>
                </div>

                <div class="result-box" id="resultBox">
                    <span class="result-label">YOUR SHORTENED URL</span>
                    <div class="result-row">
                        <span class="result-url" id="resultUrl"></span>
                        <button class="copy-btn" id="copyBtn" aria-label="Copy URL">
                            <svg class="copy-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                                <rect x="9" y="9" width="13" height="13"/>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                            </svg>
                            <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16">
                                <polyline points="20 6 9 17 4 12"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="error-box" id="errorBox">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="15" y1="9" x2="9" y2="15"/>
                        <line x1="9" y1="9" x2="15" y2="15"/>
                    </svg>
                    <span id="errorText"></span>
                </div>
            </div>

            <div class="health-section">
                <div>
                    <span class="health-label">API STATUS</span>
                </div>
                <div class="gauge-container">
                    <svg class="gauge" viewBox="0 0 200 130">
                        <path class="gauge-bg" d="M 20 115 A 80 80 0 0 1 180 115" fill="none" stroke-width="20"/>
                        <path class="gauge-fill" id="gaugeFill" d="M 20 115 A 80 80 0 0 1 180 115" fill="none" stroke-width="20"
                              stroke-dasharray="251.327" stroke-dashoffset="251.327"/>
                    </svg>
                </div>
                <span class="gauge-status" id="healthStatus">Connecting...</span>
                <span class="health-sub" id="healthSub"></span>
            </div>
        </section>
    </main>

    <footer>
        <p>BUILT WITH <span class="heart">&hearts;</span> FOR FASTER CLICKS</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
